version: '3.8'

services:
  openqa:
    build: .
    container_name: openqa
    ports:
      - "4242:4242"
    environment:
      - NODE_ENV=production
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - SAAS_URL=${SAAS_URL}
      - SAAS_AUTH_TYPE=${SAAS_AUTH_TYPE:-none}
      - SAAS_USERNAME=${SAAS_USERNAME}
      - SAAS_PASSWORD=${SAAS_PASSWORD}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_OWNER=${GITHUB_OWNER}
      - GITHUB_REPO=${GITHUB_REPO}
      - AGENT_INTERVAL_MS=${AGENT_INTERVAL_MS:-3600000}
      - AGENT_MAX_ITERATIONS=${AGENT_MAX_ITERATIONS:-20}
      - AGENT_AUTO_START=${AGENT_AUTO_START:-false}
      - WEB_PORT=4242
      - WEB_HOST=0.0.0.0
      - DB_PATH=/data/openqa.json
      - DATA_PATH=/data
    volumes:
      - openqa-data:/data
      - ./screenshots:/data/screenshots
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4242/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  openqa-data:
