version: '3.8'

services:
  openqa:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: openqa
    restart: unless-stopped
    
    ports:
      - "4242:4242"
    
    environment:
      # LLM Configuration
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-gpt-4}
      
      # Target Application
      - SAAS_URL=${SAAS_URL}
      - SAAS_AUTH_TYPE=${SAAS_AUTH_TYPE:-none}
      - SAAS_USERNAME=${SAAS_USERNAME}
      - SAAS_PASSWORD=${SAAS_PASSWORD}
      
      # GitHub Integration
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_OWNER=${GITHUB_OWNER}
      - GITHUB_REPO=${GITHUB_REPO}
      
      # Agent Configuration
      - AGENT_AUTO_START=${AGENT_AUTO_START:-false}
      - AGENT_INTERVAL_MS=${AGENT_INTERVAL_MS:-3600000}
      
      # Web UI
      - WEB_PORT=4242
      - WEB_HOST=0.0.0.0
      
      # Security (IMPORTANT!)
      - OPENQA_JWT_SECRET=${OPENQA_JWT_SECRET}
      - NODE_ENV=production
      
      # Database
      - DB_PATH=/app/data/openqa.db
    
    volumes:
      # Persist database and screenshots
      - openqa-data:/app/data
      
      # Optional: mount custom config
      # - ./custom.env:/app/.env:ro
    
    networks:
      - openqa-network
    
    # Resource limits (adjust based on your needs)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Nginx reverse proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: openqa-nginx
    restart: unless-stopped
    
    ports:
      - "80:80"
      - "443:443"
    
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    
    depends_on:
      - openqa
    
    networks:
      - openqa-network
    
    profiles:
      - with-nginx

volumes:
  openqa-data:
    driver: local
  nginx-cache:
    driver: local

networks:
  openqa-network:
    driver: bridge
